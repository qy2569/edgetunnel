name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天一次
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # Step 1: Checkout the target repo
      - name: Checkout target repo
        uses: actions/checkout@v3

      # Step 2: Sync upstream changes
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: cmliu/edgetunnel
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # 自动生成的 GitHub token，无需设置
          test_mode: false

      # Step 3: Debugging - Check repository status and branches
      - name: Debug repository status and remote
        run: |
          echo "==== Checking repository status ===="
          git status
          echo "==== Listing all remote repositories ===="
          git remote -v
          echo "==== Fetching all branches ===="
          git fetch --all
          echo "==== Listing all branches ===="
          git branch -a
          echo "==== Checking remote branches ===="
          git branch -r
          echo "==== Checking commit history ===="
          git log --oneline --graph --all

      # Step 4: Restore excluded files (README.md and sync.yml)
      - name: Restore excluded files (README.md and sync.yml)
        run: |
          echo "Restoring excluded files..."
          git fetch origin cmliu/main
          git checkout origin/cmliu/main -- README.md .github/workflows/sync.yml
          git add README.md .github/workflows/sync.yml
          git commit -m "Restore excluded files (README.md and sync.yml)"
          git push origin main

      # Step 5: Sync check (Error handling)
      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 由于上游仓库的 workflow 文件变更，导致 GitHub 自动暂停了本次自动更新，你需要手动 Sync Fork 一次，详细教程请查看项目README.md"
          echo "[Error] Due to a change in the workflow file of the upstream repository, GitHub has automatically suspended the scheduled automatic update. You need to manually sync your fork. Please refer to the project README.md for instructions."
          exit 1
